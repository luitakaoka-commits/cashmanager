<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CashFlow">
<meta name="theme-color" content="#0a0f1e">
<link rel="manifest" href="./manifest.json">
<title>CashFlow Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --bg2: #0d1528;
    --card: #111827;
    --card2: #1a2236;
    --border: #1e2d4a;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --danger: #ef4444;
    --warn: #f59e0b;
    --ok: #10b981;
    --text: #e2e8f0;
    --muted: #64748b;
    --grid: rgba(59,130,246,0.04);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      linear-gradient(135deg, rgba(59,130,246,0.05) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--grid) 39px, var(--grid) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--grid) 39px, var(--grid) 40px);
    pointer-events: none;
    z-index: 0;
  }
  #app { position: relative; z-index: 1; }

  /* NAV */
  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,15,30,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 4px 8px;
    color: var(--muted);
    cursor: pointer; border: none; background: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px; font-weight: 500;
    transition: color 0.2s;
    gap: 4px;
  }
  .nav-btn.active { color: var(--accent2); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* PAGES */
  .page { display: none; padding: 16px 16px 90px; min-height: 100vh; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.3), transparent);
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }

  /* INPUTS */
  .inp {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .inp:focus { border-color: var(--accent); }
  .inp-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 16px;
    border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; font-weight: 700;
    cursor: pointer; border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { background: #2563eb; transform: scale(0.97); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
  .btn-ok { background: var(--ok); color: #fff; }
  .btn-ok:active { background: #059669; transform: scale(0.97); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:active { background: #dc2626; transform: scale(0.97); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-ghost:active { background: var(--card2); }
  .btn-warn { background: var(--warn); color: #000; }

  /* TAGS */
  .tag {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 99px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
  }
  .tag-pending { background: rgba(245,158,11,0.15); color: var(--warn); }
  .tag-completed { background: rgba(16,185,129,0.12); color: var(--ok); }
  .tag-overdue { background: rgba(239,68,68,0.15); color: var(--danger); }
  .tag-card { background: rgba(59,130,246,0.12); color: var(--accent2); }
  .tag-cash { background: rgba(16,185,129,0.12); color: var(--ok); }

  /* BALANCE */
  .balance-num {
    font-family: 'DM Mono', monospace;
    font-size: 22px; font-weight: 500;
    letter-spacing: -0.02em;
  }
  .balance-neg { color: var(--danger); }
  .balance-ok { color: var(--text); }
  .balance-warn { color: var(--warn); }

  /* TRANSACTION ROW */
  .tx-row {
    padding: 12px 0;
    border-bottom: 1px solid rgba(30,45,74,0.5);
  }
  .tx-row:last-child { border-bottom: none; }

  /* ALERT */
  .alert {
    border-radius: 10px; padding: 12px 14px;
    margin-bottom: 10px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
  .alert-warn { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); }
  .alert-ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }

  /* HEADER */
  .page-header {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
    color: var(--text);
  }
  .page-header span { color: var(--accent2); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    width: 100%; max-width: 480px;
    background: var(--card);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border);
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(40px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 80vh; overflow-y: auto;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }

  /* SHIMMER */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, var(--card) 0%, var(--card2) 50%, var(--card) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px; height: 14px;
  }

  /* BADGE */
  .badge-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--danger);
    font-size: 10px; font-weight: 700; color: #fff;
    position: absolute; top: -4px; right: -4px;
  }

  /* BANK CARD COLORS */
  .bank-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }

  /* TOGGLE */
  .seg-ctrl {
    display: flex; background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 3px; gap: 2px;
  }
  .seg-btn {
    flex: 1; padding: 7px 8px; border-radius: 6px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    border: none; background: none; color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .seg-btn.active { background: var(--accent); color: #fff; }

  /* SCROLL */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 99px; padding: 10px 20px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 300;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  select.inp option { background: var(--card); }
</style>
</head>
<body>
<div id="app">

<!-- TOAST -->
<div id="toast"></div>

<!-- ===== PAGE: ダッシュボード ===== -->
<div class="page active" id="page-dashboard">
  <div class="page-header">Cash<span>Flow</span></div>
  
  <!-- 現在日時 -->
  <div id="jst-clock" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:16px;"></div>

  <!-- 要対応アラート -->
  <div id="overdue-alerts"></div>

  <!-- 残高サマリー -->
  <div id="bank-summary-cards"></div>

  <!-- 予測残高テーブル -->
  <div class="card">
    <div class="card-title">📊 残高シミュレーション</div>
    <div id="simulation-table"></div>
  </div>
</div>

<!-- ===== PAGE: 取引 ===== -->
<div class="page" id="page-transactions">
  <div class="page-header">取引<span>履歴</span></div>
  
  <!-- フィルタ -->
  <div class="seg-ctrl" style="margin-bottom:14px;">
    <button class="seg-btn active" onclick="filterTx('all')">すべて</button>
    <button class="seg-btn" onclick="filterTx('pending')">未処理</button>
    <button class="seg-btn" onclick="filterTx('completed')">完了済</button>
  </div>

  <div id="tx-list"></div>
</div>

<!-- ===== PAGE: 追加 ===== -->
<div class="page" id="page-add">
  <div class="page-header">取引<span>追加</span></div>

  <div class="card">
    <div class="card-title">📝 新規取引</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div>
        <div class="inp-label">日付</div>
        <input type="date" class="inp" id="tx-date">
      </div>
      <div>
        <div class="inp-label">種類</div>
        <div class="seg-ctrl">
          <button class="seg-btn active" id="type-cc" onclick="setTxType('credit_card')">💳 クレカ</button>
          <button class="seg-btn" id="type-wd" onclick="setTxType('withdrawal')">💴 現金出金</button>
        </div>
      </div>
      <div id="card-select-wrap">
        <div class="inp-label">カード名</div>
        <select class="inp" id="tx-card"></select>
      </div>
      <div>
        <div class="inp-label">引き落とし銀行口座</div>
        <select class="inp" id="tx-bank"></select>
      </div>
      <div>
        <div class="inp-label">金額 (円)</div>
        <input type="number" class="inp" id="tx-amount" placeholder="10000" inputmode="numeric">
      </div>
      <div>
        <div class="inp-label">メモ（任意）</div>
        <input type="text" class="inp" id="tx-memo" placeholder="例: 6月請求分">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="addTransaction()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
        取引を追加
      </button>
    </div>
  </div>
</div>

<!-- ===== PAGE: 設定 ===== -->
<div class="page" id="page-settings">
  <div class="page-header">設定<span> / 管理</span></div>

  <!-- 銀行口座 -->
  <div class="card">
    <div class="card-title">🏦 銀行口座</div>
    <div id="bank-list"></div>
    <div class="divider"></div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div>
        <div class="inp-label">口座名</div>
        <input type="text" class="inp" id="bank-name" placeholder="例: 三菱UFJ 普通">
      </div>
      <div>
        <div class="inp-label">現在の残高 (円)</div>
        <input type="number" class="inp" id="bank-balance" placeholder="100000" inputmode="numeric">
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="addBank()">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
        口座を追加
      </button>
    </div>
  </div>

  <!-- カード種類 -->
  <div class="card">
    <div class="card-title">💳 クレジットカード種類</div>
    <div id="card-type-list"></div>
    <div class="divider"></div>
    <div style="display:flex;gap:8px;">
      <input type="text" class="inp" id="new-card-name" placeholder="新しいカード名" style="flex:1;">
      <button class="btn btn-primary btn-sm" onclick="addCardType()">追加</button>
    </div>
  </div>

  <!-- データ管理 -->
  <div class="card">
    <div class="card-title">💾 データ管理</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-ghost" style="width:100%;" onclick="exportData()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 4v11"/></svg>
        JSONエクスポート
      </button>
      <label class="btn btn-ghost" style="width:100%;cursor:pointer;">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 14l5-5 5 5M12 20V9"/></svg>
        JSONインポート
        <input type="file" accept=".json" style="display:none;" onchange="importData(event)">
      </label>
      <button class="btn btn-danger btn-sm" style="width:100%;background:rgba(239,68,68,0.15);color:var(--danger);border:1px solid rgba(239,68,68,0.3);" onclick="clearAllData()">
        ⚠️ 全データリセット
      </button>
    </div>
  </div>
</div>

<!-- ===== NAV ===== -->
<nav class="nav-bar">
  <button class="nav-btn active" id="nav-dashboard" onclick="navigate('dashboard')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    概要
  </button>
  <button class="nav-btn" id="nav-transactions" onclick="navigate('transactions')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
    <span style="position:relative;">
      取引
      <span id="pending-badge" class="badge-num" style="display:none;"></span>
    </span>
  </button>
  <button class="nav-btn" id="nav-add" onclick="navigate('add')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
    追加
  </button>
  <button class="nav-btn" id="nav-settings" onclick="navigate('settings')">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    設定
  </button>
</nav>

<!-- MODAL: 残高編集 -->
<div class="modal-overlay" id="modal-edit-bank" onclick="closeModalIfOverlay(event,'modal-edit-bank')">
  <div class="modal-sheet">
    <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;">残高を更新</div>
    <input type="hidden" id="edit-bank-id">
    <div class="inp-label" id="edit-bank-label">口座名</div>
    <input type="number" class="inp" id="edit-bank-balance" placeholder="残高" inputmode="numeric" style="margin-bottom:14px;">
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal('modal-edit-bank')">キャンセル</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveEditBank()">保存</button>
    </div>
  </div>
</div>

<!-- MODAL: 取引詳細/完了 -->
<div class="modal-overlay" id="modal-tx-detail" onclick="closeModalIfOverlay(event,'modal-tx-detail')">
  <div class="modal-sheet">
    <div id="modal-tx-content"></div>
    <div id="modal-tx-actions" style="display:flex;gap:8px;margin-top:14px;"></div>
  </div>
</div>

</div><!-- /app -->

<script>
// ============================================================
// DATA
// ============================================================
const BANK_COLORS = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316','#84cc16'];

let state = {
  banks: [],
  cardTypes: ["MUFG NICOS","SMBC NL","EPOS","JCB W"],
  transactions: []
};

function loadState() {
  try {
    const raw = localStorage.getItem('cashflow_data');
    if (raw) state = JSON.parse(raw);
    if (!state.banks) state.banks = [];
    if (!state.cardTypes) state.cardTypes = ["MUFG NICOS","SMBC NL","EPOS","JCB W"];
    if (!state.transactions) state.transactions = [];
  } catch(e) { console.error(e); }
}

function saveState() {
  // Keep only latest 50, auto-delete old completed over 50
  let txs = [...state.transactions].sort((a,b) => new Date(b.date)-new Date(a.date));
  if (txs.length > 50) {
    // remove oldest completed first
    const completed = txs.filter(t=>t.status==='completed');
    const pending = txs.filter(t=>t.status==='pending');
    const keep = [...pending, ...completed].slice(0,50);
    state.transactions = keep;
  }
  localStorage.setItem('cashflow_data', JSON.stringify(state));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ============================================================
// JST
// ============================================================
function getJSTDate() {
  return new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });
}
function getJSTNow() {
  const now = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Tokyo',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  }).formatToParts(now);
  const p = Object.fromEntries(parts.filter(x=>x.type!=='literal').map(x=>[x.type,x.value]));
  return new Date(`${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}`);
}

// ============================================================
// NAVIGATION
// ============================================================
let currentPage = 'dashboard';
let txFilter = 'all';

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
  currentPage = page;
  renderPage(page);
}

function renderPage(page) {
  if (page==='dashboard') renderDashboard();
  else if (page==='transactions') renderTransactions();
  else if (page==='add') renderAddForm();
  else if (page==='settings') renderSettings();
}

// ============================================================
// FORMAT
// ============================================================
function fmt(n) {
  return new Intl.NumberFormat('ja-JP').format(Math.round(n));
}
function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${y}/${m}/${day}`;
}
function bankColor(id) {
  const idx = state.banks.findIndex(b=>b.id===id);
  return BANK_COLORS[idx % BANK_COLORS.length];
}
function bankName(id) {
  const b = state.banks.find(b=>b.id===id);
  return b ? b.name : '不明';
}

function renderDashboard() {
  // Clock
  const jst = getJSTNow();
  document.getElementById('jst-clock').textContent =
    `JST ${jst.getFullYear()}/${String(jst.getMonth()+1).padStart(2,'0')}/${String(jst.getDate()).padStart(2,'0')} ${String(jst.getHours()).padStart(2,'0')}:${String(jst.getMinutes()).padStart(2,'0')}`;

  renderOverdueAlerts();
  renderBankSummaryCards();
  renderSimulation();
  updatePendingBadge();

  const today = getJSTDate();
  const overdue = state.transactions.filter(t => t.status==='pending' && t.date <= today);
  const el = document.getElementById('overdue-alerts');
  if (!overdue.length) { el.innerHTML=''; return; }

  el.innerHTML = `<div class="alert alert-warn">
    <div style="font-size:20px;flex-shrink:0;">⏰</div>
    <div style="flex:1;">
      <div style="font-weight:700;font-size:13px;margin-bottom:6px;">要確認 ${overdue.length}件の取引が未処理です</div>
      ${overdue.map(t=>`
        <div style="display:flex;align-items:center;justify-content:between;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
          <div style="flex:1;min-width:0;">
            <span class="tag ${t.date<today?'tag-overdue':'tag-pending'}">${t.date<today?'期限切れ':'本日'}</span>
            <span style="font-size:12px;margin-left:6px;">${fmtDate(t.date)}</span>
            <span style="font-size:12px;margin-left:4px;color:var(--muted);">${t.type==='credit_card'?'['+t.cardName+']':'[現金]'}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:600;">¥${fmt(t.amount)}</span>
            <button class="btn btn-ok btn-sm" onclick="completeTransaction('${t.id}')">完了</button>

}

function renderBankSummaryCards() {
  const el = document.getElementById('bank-summary-cards');
  if (!state.banks.length) {
    el.innerHTML = `<div class="alert alert-warn"><div>⚠️</div><div style="font-size:13px;">銀行口座が登録されていません。設定から追加してください。</div></div>`;
    return;
  }
  el.innerHTML = state.banks.map(b => {
    const today = getJSTDate();
    const pending = state.transactions.filter(t=>t.bankId===b.id && t.status==='pending' && t.date>today);
    const totalPending = pending.reduce((s,t)=>s+t.amount,0);
    const predictedMin = getMinPredictedBalance(b.id);
    const balClass = predictedMin < 0 ? 'balance-neg' : predictedMin < 10000 ? 'balance-warn' : 'balance-ok';
    return `<div class="card" style="border-left:3px solid ${bankColor(b.id)};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;">${b.name}</div>
          <div class="balance-num balance-ok">¥${fmt(b.currentBalance)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">現在の実残高</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">予定引落 ${pending.length}件</div>
          <div style="font-size:13px;color:var(--warn);">-¥${fmt(totalPending)}</div>
          <button class="btn btn-ghost btn-sm" style="margin-top:6px;font-size:11px;" onclick="openEditBank('${b.id}')">残高更新</button>
        </div>
      </div>
      ${predictedMin < 0 ? `<div style="margin-top:8px;padding:6px 10px;background:rgba(239,68,68,0.1);border-radius:6px;font-size:11px;color:var(--danger);">⚠️ 資金ショートの可能性: 最低予測 ¥${fmt(predictedMin)}</div>` : ''}
    </div>`;
  }).join('');
}

function getMinPredictedBalance(bankId) {
  const bank = state.banks.find(b=>b.id===bankId);
  if (!bank) return 0;
  const today = getJSTDate();
  const pending = state.transactions
    .filter(t=>t.bankId===bankId && t.status==='pending' && t.date>today)
    .sort((a,b)=>a.date.localeCompare(b.date));
  let bal = bank.currentBalance;
  let min = bal;
  for (const t of pending) {
    bal -= t.amount;
    if (bal < min) min = bal;
  }
  return min;
}

function renderSimulation() {
  const el = document.getElementById('simulation-table');
  if (!state.banks.length) { el.innerHTML='<div style="font-size:12px;color:var(--muted);">口座を追加してください</div>'; return; }

  const today = getJSTDate();
  const pending = state.transactions
    .filter(t=>t.status==='pending' && t.date>today)
    .sort((a,b)=>a.date.localeCompare(b.date));

  if (!pending.length) {
    el.innerHTML = `<div style="font-size:12px;color:var(--muted);text-align:center;padding:16px 0;">予定取引はありません</div>`;
    return;
  }

  // Group by date
  const byDate = {};
  for (const t of pending) {
    if (!byDate[t.date]) byDate[t.date] = [];
    byDate[t.date].push(t);
  }

  // Running balances per bank
  const balances = {};
  state.banks.forEach(b => balances[b.id] = b.currentBalance);

  let html = '';
  const dates = Object.keys(byDate).sort();
  for (const date of dates) {
    html += `<div style="margin-bottom:12px;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:6px;">${fmtDate(date)}</div>`;
    for (const t of byDate[date]) {
      balances[t.bankId] -= t.amount;
      const bal = balances[t.bankId];
      const isNeg = bal < 0;
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:8px;background:${isNeg?'rgba(239,68,68,0.08)':'rgba(17,24,39,0.6)'};border-radius:8px;border:1px solid ${isNeg?'rgba(239,68,68,0.2)':'var(--border)'};">
        <div style="width:6px;height:6px;border-radius:50%;background:${bankColor(t.bankId)};flex-shrink:0;"></div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.type==='credit_card'?'💳 '+t.cardName:'💴 現金出金'}${t.memo?' - '+t.memo:''}</div>
          <div style="font-size:10px;color:var(--muted);">${bankName(t.bankId)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--danger);">-¥${fmt(t.amount)}</div>
          <div style="font-family:'DM Mono',monospace;font-size:11px;color:${isNeg?'var(--danger)':bal<10000?'var(--warn)':'var(--ok)'};">${isNeg?'⚠️':''} ¥${fmt(bal)}</div>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

// ============================================================
// TRANSACTIONS
// ============================================================
function renderTransactions() {
  updatePendingBadge();
  const today = getJSTDate();
  let txs = [...state.transactions].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  if (txFilter==='pending') txs = txs.filter(t=>t.status==='pending');
  else if (txFilter==='completed') txs = txs.filter(t=>t.status==='completed');
  txs = txs.slice(0,50);

  const el = document.getElementById('tx-list');
  if (!txs.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:14px;">取引はありません</div>`;
    return;
  }

  el.innerHTML = txs.map(t => {
    const isOverdue = t.status==='pending' && t.date<=today;
    const statusTag = t.status==='completed'
      ? '<span class="tag tag-completed">完了</span>'
      : isOverdue
        ? '<span class="tag tag-overdue">期限切れ</span>'
        : '<span class="tag tag-pending">予定</span>';
    const typeTag = t.type==='credit_card'
      ? `<span class="tag tag-card">💳 ${t.cardName}</span>`
      : '<span class="tag tag-cash">💴 現金</span>';

    return `<div class="card tx-row" style="padding:12px;cursor:pointer;${isOverdue?'border-color:rgba(245,158,11,0.4);':''}" onclick="openTxDetail('${t.id}')">
      <div style="display:flex;align-items:flex-start;gap:10px;">
        <div style="width:8px;height:8px;border-radius:50%;background:${bankColor(t.bankId)};flex-shrink:0;margin-top:5px;"></div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
            ${typeTag}
            ${statusTag}
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:16px;font-weight:500;margin-bottom:2px;">¥${fmt(t.amount)}</div>
          <div style="font-size:11px;color:var(--muted);">${fmtDate(t.date)} | ${bankName(t.bankId)}${t.memo?' | '+t.memo:''}</div>
        </div>
        ${t.status==='pending' ? `<button class="btn btn-ok btn-sm" onclick="event.stopPropagation();completeTransaction('${t.id}')">完了</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function filterTx(f) {
  txFilter = f;
  document.querySelectorAll('.seg-btn').forEach((b,i)=>{
    const vals = ['all','pending','completed'];
    b.classList.toggle('active', vals[i]===f);
  });
  renderTransactions();
}

function updatePendingBadge() {
  const today = getJSTDate();
  const count = state.transactions.filter(t=>t.status==='pending' && t.date<=today).length;
  const badge = document.getElementById('pending-badge');
  badge.style.display = count>0 ? 'flex' : 'none';
  badge.textContent = count>9 ? '9+' : count;
}

  if (!t) return;
  const today = getJSTDate();
  const isOverdue = t.status==='pending' && t.date<=today;

  document.getElementById('modal-tx-content').innerHTML = `
    <div style="font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:14px;">取引詳細</div>
    <div style="display:flex;flex-direction:column;gap:10px;">

      <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);font-size:13px;">種類</span><span>${t.type==='credit_card'?'💳 クレカ':'💴 現金出金'}</span></div>
      ${t.type==='credit_card'?`<div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);font-size:13px;">カード</span><span style="font-size:13px;">${t.cardName}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);font-size:13px;">銀行</span><span style="font-size:13px;">${bankName(t.bankId)}</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);font-size:13px;">金額</span><span style="font-family:'DM Mono',monospace;font-size:18px;font-weight:600;">¥${fmt(t.amount)}</span></div>
      ${t.memo?`<div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);font-size:13px;">メモ</span><span style="font-size:13px;">${t.memo}</span></div>`:''}

    </div>
  `;

  const actions = document.getElementById('modal-tx-actions');
  actions.innerHTML = `<button class="btn btn-ghost" style="flex:1;" onclick="closeModal('modal-tx-detail')">閉じる</button>`;

    actions.innerHTML += `<button class="btn btn-ok" style="flex:1;" onclick="completeTransaction('${t.id}');closeModal('modal-tx-detail');">引き落とし完了</button>`;

  actions.innerHTML += `<button class="btn btn-sm" style="background:rgba(239,68,68,0.15);color:var(--danger);border:1px solid rgba(239,68,68,0.3);" onclick="deleteTx('${t.id}')">削除</button>`;

  openModal('modal-tx-detail');
}

// ============================================================
// COMPLETE TRANSACTION
// ============================================================
function completeTransaction(id) {
  const t = state.transactions.find(t=>t.id===id);
  if (!t || t.status==='completed') return;
  const bank = state.banks.find(b=>b.id===t.bankId);
  if (!bank) { showToast('口座が見つかりません'); return; }
  bank.currentBalance -= t.amount;
  t.status = 'completed';
  saveState();
  showToast(`¥${fmt(t.amount)} を ${bank.name} から引き落とし完了`);
  renderPage(currentPage);
}

function deleteTx(id) {
  if (!confirm('この取引を削除しますか？')) return;
  state.transactions = state.transactions.filter(t=>t.id!==id);
  saveState();
  closeModal('modal-tx-detail');
  renderPage(currentPage);
  showToast('取引を削除しました');
}

let currentTxType = 'credit_card';

function renderAddForm() {
  // Set today
  const today = getJSTDate();
  const dateEl = document.getElementById('tx-date');
  if (!dateEl.value) dateEl.value = today;

  // Banks dropdown
  const bankSel = document.getElementById('tx-bank');
  bankSel.innerHTML = state.banks.length
    ? state.banks.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')
    : '<option value="">-- 銀行を先に追加 --</option>';

  // Cards dropdown
  const cardSel = document.getElementById('tx-card');
  cardSel.innerHTML = state.cardTypes.map(c=>`<option value="${c}">${c}</option>`).join('');

  setTxType(currentTxType);
}

function setTxType(type) {
  currentTxType = type;
  document.getElementById('type-cc').classList.toggle('active', type==='credit_card');
  document.getElementById('type-wd').classList.toggle('active', type==='withdrawal');
  document.getElementById('card-select-wrap').style.display = type==='credit_card' ? 'block' : 'none';
}

function addTransaction() {
  const date = document.getElementById('tx-date').value;
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const bankId = document.getElementById('tx-bank').value;
  const memo = document.getElementById('tx-memo').value.trim();

  if (!date) { showToast('日付を入力してください'); return; }
  if (!amount || amount<=0) { showToast('金額を入力してください'); return; }
  if (!bankId) { showToast('銀行口座を選択してください'); return; }

  const tx = {
    id: uid(),
    date,
    type: currentTxType,
    amount,
    bankId,
    memo,
    status: 'pending',
    cardName: currentTxType==='credit_card' ? document.getElementById('tx-card').value : null
  };

  state.transactions.push(tx);
  saveState();

  // Reset
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-memo').value = '';
  document.getElementById('tx-date').value = getJSTDate();

  showToast('取引を追加しました');
  navigate('transactions');
}

function addBank() {
  const name = document.getElementById('bank-name').value.trim();
  const bal = parseFloat(document.getElementById('bank-balance').value);
  if (!name) { showToast('口座名を入力してください'); return; }
  if (isNaN(bal)) { showToast('残高を入力してください'); return; }
  state.banks.push({ id: uid(), name, currentBalance: bal });
  document.getElementById('bank-name').value = '';
  document.getElementById('bank-balance').value = '';
  saveState();
  renderSettings();
  showToast('口座を追加しました');
}

function deleteBank(id) {
  if (!confirm('この口座を削除しますか？')) return;
  state.banks = state.banks.filter(b=>b.id!==id);
  state.transactions = state.transactions.filter(t=>t.bankId!==id);
  saveState();
  renderSettings();
  showToast('口座を削除しました');
}

function openEditBank(id) {
  const bank = state.banks.find(b=>b.id===id);
  if (!bank) return;
  document.getElementById('edit-bank-id').value = id;
  document.getElementById('edit-bank-label').textContent = bank.name;
  document.getElementById('edit-bank-balance').value = bank.currentBalance;
  openModal('modal-edit-bank');
}

function saveEditBank() {
  const id = document.getElementById('edit-bank-id').value;
  const bal = parseFloat(document.getElementById('edit-bank-balance').value);
  if (isNaN(bal)) { showToast('残高を入力してください'); return; }
  const bank = state.banks.find(b=>b.id===id);
  if (!bank) return;
  bank.currentBalance = bal;
  saveState();
  closeModal('modal-edit-bank');
  renderPage(currentPage);
  showToast('残高を更新しました');
}

function addCardType() {
  const name = document.getElementById('new-card-name').value.trim();
  if (!name) { showToast('カード名を入力してください'); return; }
  if (state.cardTypes.includes(name)) { showToast('既に存在します'); return; }
  state.cardTypes.push(name);
  document.getElementById('new-card-name').value = '';
  saveState();
  renderSettings();
  showToast('カードを追加しました');
}

function deleteCardType(i) {
  if (!confirm(`「${state.cardTypes[i]}」を削除しますか？`)) return;
  state.cardTypes.splice(i,1);
  saveState();
  renderSettings();
  showToast('カードを削除しました');
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  a.download = `cashflow_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('エクスポートしました');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      if (!data.banks || !data.cardTypes || !data.transactions) throw new Error('invalid');
      if (!confirm('既存のデータを上書きしてインポートしますか？')) return;
      state = data;
      saveState();
      renderPage(currentPage);
      showToast('インポートしました');
    } catch(err) {
      showToast('ファイルの形式が不正です');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearAllData() {
  if (!confirm('全データを削除します。この操作は取り消せません。')) return;
  state = { banks:[], cardTypes:["MUFG NICOS","SMBC NL","EPOS","JCB W"], transactions:[] };
  saveState();
  renderPage(currentPage);
  showToast('データをリセットしました');
}

// ============================================================
// ICON GENERATION (canvas)
// ============================================================
function generateIcons() {
  const sizes = [192, 512];
  sizes.forEach(size => {
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    // bg
    ctx.fillStyle = '#0a0f1e';
    ctx.fillRect(0,0,size,size);
    // grid
    ctx.strokeStyle = 'rgba(59,130,246,0.08)';
    ctx.lineWidth = 1;
    const step = size/8;
    for(let i=0;i<size;i+=step){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,size);ctx.stroke();}
    for(let i=0;i<size;i+=step){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(size,i);ctx.stroke();}
    // accent circle
    const grad = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size*0.4);
    grad.addColorStop(0,'rgba(59,130,246,0.3)');
    grad.addColorStop(1,'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,size,size);
    // text
    ctx.fillStyle = '#60a5fa';
    ctx.font = `bold ${size*0.28}px 'Syne',sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('CF', size/2, size/2);
    // small text
    ctx.fillStyle = 'rgba(100,116,139,0.8)';
    ctx.font = `${size*0.07}px sans-serif`;
    ctx.fillText('CASHFLOW', size/2, size*0.72);
  });
}

// ============================================================
// INIT
// ============================================================
loadState();
renderDashboard();

// Clock update
setInterval(()=>{
  if (currentPage==='dashboard') {
    const jst = getJSTNow();
    const el = document.getElementById('jst-clock');
    if (el) el.textContent = `JST ${jst.getFullYear()}/${String(jst.getMonth()+1).padStart(2,'0')}/${String(jst.getDate()).padStart(2,'0')} ${String(jst.getHours()).padStart(2,'0')}:${String(jst.getMinutes()).padStart(2,'0')}`;
  }
}, 30000);
</script>
